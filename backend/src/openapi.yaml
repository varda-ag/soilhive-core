openapi: 3.0.3
info:
  title: SoilHive core API
  version: 1.0.0
servers:
  - url: /v1
  - url: /

paths:
  /auth/config:
    get:
      x-eov-operation-handler: controllers/auth
      x-eov-operation-id: getConfig
      summary: Retrieve authentication configuration
      tags:
        - auth
      responses:
        '200':
          description: Authentication configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfig'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /oauth/token:
    post:
      x-eov-operation-handler: controllers/auth
      x-eov-operation-id: getToken
      summary: Obtain JWT token using password grant
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum:
                    - password
                  description: The OAuth2 grant type (only password is supported)
                username:
                  type: string
                  description: Username (required for password grant, value is ignored)
                password:
                  type: string
                  format: password
                  description: Password (required for password grant)
              required:
                - grant_type
                - password
      responses:
        '200':
          description: JWT token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
  /config/{configId}:
    parameters:
      - name: configId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier for the configuration
    put:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: putConfig
      summary: Create or update configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigItem'
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigItem'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: getConfig
      summary: Retrieve configuration item
      tags:
        - config
      responses:
        '200':
          description: Configuration object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigItem'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: deleteConfig
      summary: Delete configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        '204':
          description: Configuration deleted successfully

  /config-export:
    post:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: exportConfigs
      summary: Exports all configuration items
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        '200':
          description: Object containing all the stored configurations

  /frontend/logo:
    post:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileUpload
      summary: Upload platform logo
      tags:
        - frontend
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
            encoding:
              file:
                contentType: image/svg+xml
      responses:
        '201':
          description: Logo uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDescriptor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
      security:
        - bearerAuth: [super-admin]
    get:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: logoDownload
      summary: Download platform logo
      tags:
        - frontend
      responses:
        '200':
          description: Logo downloaded successfully
    delete:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: logoDelete
      summary: Remove custom logo
      tags:
        - frontend
      security:
        - bearerAuth: [super-admin]
      responses:
        '204':
          description: Logo deleted successfully

  /datasets:
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getDatasets
      summary: Get metadata for all datasets
      tags:
        - datasets
      responses:
        '200':
          description: Dataset array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'
    post:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: createDataset
      summary: Create a new dataset
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetInput'
      responses:
        '200':
          description: Dataset created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /datasets/{datasetId}:
    parameters:
      - name: datasetId
        in: path
        required: true
        schema:
          type: string
        description: Dataset ID
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getDataset
      summary: Get metadata for a specific dataset
      tags:
        - datasets
      responses:
        '200':
          description: Dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'

    patch:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: updateDataset
      summary: Update an existing dataset
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Dataset'
      responses:
        '200':
          description: Dataset updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: deleteDataset
      summary: Delete a specific dataset
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          description: The ID of the dataset to delete
          schema:
            type: string
      responses:
        '204':
          description: Dataset successfully deleted (no content returned)
        '401':
          description: Unauthorized - Token subject is missing

  /datasets/{datasetId}/bulk-load:
    parameters:
      - name: datasetId
        in: path
        required: true
        schema:
          type: string
        description: ID of the dataset to load data into
    post:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: postBulkLoad
      summary: Starts bulk operation to load soil data records into the system
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      responses:
        '201':
          description: Bulk load job started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkLoad'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /datasets/{datasetId}/bulk-load/{bulkLoadId}:
    parameters:
      - name: datasetId
        in: path
        required: true
        schema:
          type: string
        description: ID of the dataset to load data into
      - name: bulkLoadId
        in: path
        required: true
        schema:
          type: string
        description: ID of the bulk load job
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getBulkLoad
      summary: Get bulk load operation status
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkLoad'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /soil-properties:
    get:
      x-eov-operation-handler: controllers/soil-properties
      x-eov-operation-id: getSoilProperties
      summary: Get metadata for all soil properties
      tags:
        - soil-properties
      responses:
        '200':
          description: Soil property array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SoilProperty'

  /soil-properties/{soilPropertyId}:
    parameters:
      - name: soilPropertyId
        in: path
        required: true
        schema:
          type: string
        description: Soil property ID
    get:
      x-eov-operation-handler: controllers/soil-properties
      x-eov-operation-id: getSoilProperty
      summary: Get metadata for a specific soil property
      tags:
        - soil-properties
      responses:
        '200':
          description: Dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoilProperty'

  /data-filters:
    post:
      x-eov-operation-handler: controllers/data-filters
      x-eov-operation-id: postDataFilters
      summary: Creates a new data filter
      tags:
        - data-filters
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataFilter'
      responses:
        '201':
          description: Filter created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredDataFilter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      x-eov-operation-handler: controllers/data-filters
      x-eov-operation-id: getDataFilters
      summary: Retrieves all data filters owned by the user
      tags:
        - data-filters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of data filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoredDataFilter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /data-filters/{filterId}:
    parameters:
      - name: filterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Unique filter identifier
    get:
      x-eov-operation-handler: controllers/data-filters
      x-eov-operation-id: getDataFilterById
      summary: Retrieves a filter by ID
      tags:
        - data-filters
      responses:
        '200':
          description: Filter information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredDataFilter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /data-filters/{filterId}/coverage:
    parameters:
      - name: filterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Unique filter identifier
    get:
      x-eov-operation-handler: controllers/data-filters
      x-eov-operation-id: getDataFilterCoverage
      summary: Retrieves what data is available for the given filter
      tags:
        - data-filters
      security:
        - bearerAuth: []
        - {}
      responses:
        '200':
          description: List of datasets matching the filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilteredDatasetsList'
        '404':
          $ref: '#/components/responses/NotFound'

  /soil-data:
    get:
      x-eov-operation-handler: controllers/soil-data
      x-eov-operation-id: getSoilData
      summary: Retrieves soil data
      tags:
        - soil-data
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: query
          name: datasets
          required: true
          description: IDs of datasets to retrieve data from (comma-separated)
          schema:
            type: array
            items:
              type: string
          explode: false
        - in: query
          name: filterId
          required: false
          description: ID of a stored data filter to apply
          schema:
            type: string
            format: uuid
          explode: false
        - in: query
          name: limit
          required: true
          description: Number of items in the response
          schema:
            type: number
            default: 100
        - in: query
          name: cursor
          required: false
          description: Pagination cursor
          schema:
            type: string
        - in: query
          name: sort
          required: false
          description: Sort column. Prepend with '-' for descending order
          schema:
            type: string
            enum:
              - dataset_id
              - dataset_name
              - extractant_concentration
              - extractant_formulation
              - extraction_base
              - extraction_ratio
              - geometry
              - horizon
              - instrument
              - license_name
              - limit_of_detection
              - max_depth
              - min_depth
              - property_acronym
              - sample_pretreatment
              - sampling_date
              - soil_property
              - standard_unit
              - technique
              - value
              - -dataset_id
              - -dataset_name
              - -extractant_concentration
              - -extractant_formulation
              - -extraction_base
              - -extraction_ratio
              - -geometry
              - -horizon
              - -instrument
              - -license_name
              - -limit_of_detection
              - -max_depth
              - -min_depth
              - -property_acronym
              - -sample_pretreatment
              - -sampling_date
              - -soil_property
              - -standard_unit
              - -technique
              - -value
      responses:
        '200':
          description: Soil data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SoilDataSample'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    # TODO: replace current POST /soil-data?dataset=&mapping= with POST /datasets/{datasetId}/dataset-file-mapping/{datasetFileMappingId}/soil-data
    post:
      x-eov-operation-handler: controllers/soil-data
      x-eov-operation-id: postSoilData
      summary: Loads soil data record into the system
      tags:
        - soil-data
      security:
        - bearerAuth: [data-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SoilRecord'
      parameters:
        - name: dataMappingId
          in: query
          required: true
          schema:
            type: string
          description: Unique identifier of the mapping to be applied to the raw record
        - name: datasetId
          in: query
          required: true
          schema:
            type: string
          description: ID of the dataset to assign to the created soil data
      responses:
        '201':
          description: Soil data loaded successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /files/{fileId}:
    parameters:
      - name: fileId
        in: path
        required: true
        schema:
          type: string
        description: Unique file identifier. Folder separators should be encoded as %2F
    post:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileUpload
      summary: Upload a file
      tags:
        - TODO (to be removed or specialized)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDescriptor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
      security:
        - bearerAuth: [super-admin, data-admin]

    get:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileDownload
      summary: Download a file
      tags:
        - TODO (to be removed or specialized)
      parameters:
        - in: query
          name: token
          required: false
          description: Temporary access token to download access-protected files
          schema:
            type: string
      responses:
        '200':
          description: File downloaded successfully

  /mappings:
    post:
      x-eov-operation-handler: controllers/mappings
      x-eov-operation-id: createDataMapping
      summary: Create a new data mapping
      tags:
        - mappings
      security:
        - bearerAuth: [data-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataMappingObject'
      responses:
        '200':
          description: Data mapping created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataMapping'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /mappings/{mappingId}:
    parameters:
      - name: mappingId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Data mapping ID
    get:
      x-eov-operation-handler: controllers/mappings
      x-eov-operation-id: getDataMapping
      summary: Get a specific data mapping
      tags:
        - mappings
      security:
        - bearerAuth: [data-admin]
      responses:
        '200':
          description: Data mapping retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataMapping'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      x-eov-operation-handler: controllers/mappings
      x-eov-operation-id: deleteDataMapping
      summary: Delete mapping item
      tags:
        - mappings
      security:
        - bearerAuth: [data-admin]
      responses:
        '204':
          description: Mapping deleted successfully

components:
  responses:
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthConfig:
      type: object
      required:
        - authMode
      properties:
        authMode:
          type: string
          description: Authentication mode type
        oidcConfig:
          $ref: '#/components/schemas/OIDCConfig'

    OIDCConfig:
      type: object
      required:
        - authority
        - clientId
        - redirectUri
        - postLogoutRedirectUri
        - silentRedirectUri
        - scope
      properties:
        authority:
          type: string
        clientId:
          type: string
        redirectUri:
          type: string
        postLogoutRedirectUri:
          type: string
        silentRedirectUri:
          type: string
        scope:
          type: string

    ConfigItem:
      type: object

    ErrorResponse:
      type: object
      required:
        - title
        - status
        - detail
        - instance
      properties:
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: 'Not Found'
        status:
          type: integer
          description: The HTTP status code
          example: 404
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: 'The requested configuration resource was not found.'
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence of the problem. It may yield further information if dereferenced.

    Geometry:
      $ref: '../src/GeoJSON-OAS3.yaml#/components/schemas/Geometry'

    FileDescriptor:
      type: object
      properties:
        id:
          type: string
          description: Internal file identifier
        key:
          type: string
          description: Storage key (path-like)
        size:
          type: integer
          description: File size in bytes
        mimeType:
          type: string
          description: MIME type of the file
        uploadedAt:
          type: string
          format: date-time
          description: Upload timestamp
        metadata:
          type: object
          additionalProperties: true
      required:
        - id
        - key
        - size
        - mimeType
        - uploadedAt

    FilterCriteria:
      type: object
      properties:
        data_types:
          type: array
          items:
            type: string
            enum:
              - point
              - polygonal
              - raster
            description: Type of data contained in the dataset (e.g., point samples, raster data)
        licenses:
          type: array
          items:
            type: string
        min_sampling_date:
          type: string
        max_sampling_date:
          type: string
        min_depth:
          type: number
        max_depth:
          type: number
        horizons:
          type: array
          items:
            type: string
        soil_properties:
          type: array
          items:
            type: string
        raster_filters:
          type: object
          additionalProperties:
            type: array
            items:
              type: number

    DataFilter:
      type: object
      properties:
        geometries:
          type: array
          items:
            $ref: '#/components/schemas/Geometry'
        parameters:
          $ref: '#/components/schemas/FilterCriteria'
      required:
        - geometries
        - parameters

    FilteredDataset:
      allOf:
        - $ref: '#/components/schemas/FilterCriteria'
        - type: object
          properties:
            id:
              type: string
              description: Dataset identifier
            name:
              type: string
              description: Human-readable dataset name
            data_type:
              type: string
              enum:
                - point
                - polygonal
                - raster
              description: Type of data contained in the dataset (e.g., point samples, raster data)
            dataset_layer_count:
              type: integer
              description: Number of features matching the filter in this dataset
          required:
            - id
            - name
            - dataset_layer_count

    StoredDataFilter:
      type: object
      properties:
        id:
          type: string
          description: Filter identifier
        name:
          type: string
          description: Human readable name for the filter
        filter:
          $ref: '#/components/schemas/DataFilter'

    FilteredDatasetsList:
      type: array
      items:
        $ref: '#/components/schemas/FilteredDataset'

    SoilDataSample:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the soil data sample
        dataset_id:
          type: string
          description: Dataset identifier
        dataset_name:
          type: string
          description: Human-readable dataset name
        soil_property:
          type: string
          description: Full name of the soil property measured
        property_acronym:
          type: string
          description: Acronym or shorthand for the soil property
        standard_unit:
          type: string
          description: Standard unit of measurement for the value
        value:
          type: number
          description: Measured numerical value
        geometry:
          type: object
          description: Spatial representation of the sample location
        license_name:
          type: string
          description: Name of the data license
        sampling_date:
          type: string
          format: date
          nullable: true
