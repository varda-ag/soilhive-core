          type: string
        description: Raster filter ID
    get:
      x-eov-operation-handler: controllers/raster-filters
      x-eov-operation-id: getRasterFilter
      summary: Get raster filter by ID
      tags:
        - raster-filters
      responses:
        '200':
          description: Raster filter information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RasterFilter'

components:
  responses:
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Gone:
      description: The requested resource is no longer available
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthConfig:
      type: object
      required:
        - authMode
      properties:
        authMode:
          type: string
          description: Authentication mode type
        oidcConfig:
          $ref: '#/components/schemas/OIDCConfig'

    OIDCConfig:
      type: object
      required:
        - authority
        - clientId
        - redirectUri
        - postLogoutRedirectUri
        - silentRedirectUri
        - scope
      properties:
        authority:
          type: string
        clientId:
          type: string
        redirectUri:
          type: string
        postLogoutRedirectUri:
          type: string
        silentRedirectUri:
          type: string
        scope:
          type: string

    ConfigItem:
      type: object

    ErrorResponse:
      type: object
      required:
        - title
        - status
        - detail
        - instance
      properties:
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: 'Not Found'
        status:
          type: integer
          description: The HTTP status code
          example: 404
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: 'The requested configuration resource was not found.'
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence of the problem. It may yield further information if dereferenced.

    Geometry:
      $ref: '../src/GeoJSON-OAS3.yaml#/components/schemas/Geometry'

    FileDescriptor:
      type: object
      properties:
        id:
          type: string
          description: Unique file identifier
        name:
          type: string
          description: File name
        file_path:
          type: string
          description: Storage key (path-like)
        status:
          type: string
          readOnly: true
        metadata:
          type: object
          description: Spatial file fields, CRS and geometry information
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          readOnly: true
        updated_by:
          type: string
          readOnly: true
      required:
        - id
        - name
        - created_at
        - created_by

    FileUpdatePayload:
      type: object
      properties:
        epsg:
          type: number
          description: EPSG code of the spatial file

    FilterCriteria:
      type: object
      properties:
        data_types:
          type: array
          items:
            type: string
            enum:
              - point
              - polygonal
              - raster
            description: Type of data contained in the dataset (e.g., point samples, raster data)
        licenses:
          type: array
          items:
            type: string
        min_sampling_date:
          type: string
        max_sampling_date:
          type: string
        min_depth:
          type: number
        max_depth:
          type: number
        horizons:
          type: array
          items:
            type: string
        soil_properties:
          type: array
          items:
            type: string
        raster_filters:
          type: object
          additionalProperties:
            type: array
            items:
              type: number

    DataFilter:
      type: object
      properties:
        geometries:
          type: array
          items:
            $ref: '#/components/schemas/Geometry'
        parameters:
          $ref: '#/components/schemas/FilterCriteria'
      required:
        - geometries
        - parameters

    FilteredDataset:
      type: object
      properties:
        id:
          type: string
          description: Dataset identifier
        name:
          type: string
          description: Dataset name
        data_type:
          type: string
          enum:
            - point
            - polygonal
            - raster
          description: Type of data contained in the dataset (e.g., point samples, raster data)
        visibility:
          type: string
          enum: [public, private]
          default: private

    FilteredDatasetSummary:
      allOf:
        - $ref: '#/components/schemas/FilterCriteria'
        - type: object
          properties:
            id:
              type: string
              description: Dataset identifier
            name:
              type: string
              description: Human-readable dataset name
            data_type:
              type: string
              enum:
                - point
                - polygonal
                - raster
              description: Type of data contained in the dataset (e.g., point samples, raster data)
            dataset_layer_count:
              type: integer
              description: Number of features matching the filter in this dataset
          required:
            - id
            - name
            - dataset_layer_count

    StoredDataFilter:
      type: object
      properties:
        id:
          type: string
          description: Filter identifier
        name:
          type: string
          description: Human readable name for the filter
        filter:
          $ref: '#/components/schemas/DataFilter'

    FilteredDatasetsList:
      type: array
      items:
        $ref: '#/components/schemas/FilteredDatasetSummary'
    
    FilteredData:
      type: object
      properties:
        datasets:
          $ref: '#/components/schemas/FilteredDatasetsList'
        raster_filters:
          type: object
          additionalProperties:
            type: array
            items:
              type: number

    SoilDataSample:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the soil data sample
        dataset_id:
          type: string
          description: Dataset identifier
        dataset_name:
          type: string
          description: Human-readable dataset name
        soil_property:
          type: string
          description: Full name of the soil property measured
        property_acronym:
          type: string
          description: Acronym or shorthand for the soil property
        standard_unit:
          type: string
          description: Standard unit of measurement for the value
        value:
          type: number
          description: Measured numerical value
        geometry:
          type: object
          description: Spatial representation of the sample location
        license_name:
          type: string
          description: Name of the data license
        sampling_date:
          anyOf:
            - type: string
              format: date
              nullable: true
            - type: string
              pattern: '^\d{4}(-\d{2}){0,2}$'
              nullable: true
          description: Sampling date, if available
        min_depth:
          type: number
          nullable: true
          description: Minimum sampling depth in centimeters
        max_depth:
          type: number
          nullable: true
          description: Maximum sampling depth in centimeters
        sample_pretreatment:
          type: string
          nullable: true
          description: Pretreatment applied before analysis
        technique:
          type: string
          nullable: true
          description: Analytical or experimental technique used
        laboratory_method:
          type: string
          nullable: true
          description: The named laboratory method or protocol used to generate the result, including standard protocols or digestion/combustion approaches where applicable
        extractant_concentration:
          type: string
          nullable: true
          description: Extractant concentration details
        extraction_ratio:
          type: string
          nullable: true
          description: Ratio of sample to extractant used
        extraction_base:
          type: string
          nullable: true
          description: Base or solvent used in extraction
        measurement_procedure:
          type: string
          nullable: true
          description: Measurement procedure or instrument used for analysis
        limit_of_detection:
          type: string
          nullable: true
          description: Limit of detection for the measurement
        cursor:
          type: string
          description: Cursor for pagination or sequential retrieval
      required:
        - id
        - dataset_id
        - dataset_name
        - soil_property
        - property_acronym
        - standard_unit
        - value
        - geometry
        - license_name
        - cursor

    MeasuredProperty:
      type: object
      properties:
        soil_property_id:
          type: string
        procedure_id:
          type: string

    CreateDatasetInput:
      allOf:
        - $ref: '#/components/schemas/Dataset'
      required:
        - name

    Dataset:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        full_name:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        data_producer:
          type: string
          nullable: true
        measured_properties:
          type: array
          items:
            $ref: '#/components/schemas/MeasuredProperty'
          readOnly: true
        spatial_resolution:
          type: string
          nullable: true
        publication_date:
          type: string
          format: date
          nullable: true
        reference_period_start:
          type: string
          format: date
          nullable: true
        reference_period_stop:
          type: string
          format: date
          nullable: true
        licenses:
          type: array
          items:
            type: string
          nullable: true
        citation:
          type: string
          nullable: true
        geographical_extent:
          type: string
          nullable: true
        gis_datatype:
          type: string
          nullable: true
        spatial_extent:
          type: object
          nullable: true
          # TODO: this triggers an OpenApiValidator bug
          # $ref: "../src/GeoJSON-OAS3.yaml#/components/schemas/Polygon"
        n_observations:
          type: string
          nullable: true
        n_raster_layers:
          type: integer
          nullable: true
        soil_depth:
          type: object
          nullable: true
        status:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          readOnly: true
        updated_by:
          type: string
          readOnly: true
        service_location:
          type: string
          nullable: true
        visibility:
          type: string
          enum: [public, private]
          default: private
        capabilities:
          type: array
          items:
            type: string
            enum: [preview, download, obfuscate_as_points, obfuscate_as_polygons]
          readOnly: true
        inferred_properties:
          type: array
          items:
            type: string
          nullable: true
          readOnly: true

    SoilProperty:
      type: object
      required:
        - id
        - property_name
        - property_acronym
        - category_id
      properties:
        id:
          type: string
          description: Unique identifier
        property_name:
          type: string
          description: Human-readable name
        property_acronym:
          type: string
          description: Abbreviation
        description:
          type: string
          nullable: true
          description: Optional description
        standard_unit:
          type: string
          nullable: true
          description: Standard unit
        property_level:
          type: integer
          nullable: true
          description: Hierarchical level
        parent_property_id:
          type: string
          nullable: true
          description: Parent property ID, if applicable
        category_id:
          type: string
          description: Category identifier
        original_units_of_measurement:
          type: array
          items:
            type: string
          description: Allowed original units of measurement for this property (empty when none are defined)

    SoilPropertyCategory:
      type: object
      properties:
        id:
          type: string
          description: Identifier for the soil property category
        category_name:
          type: string
          description: Full name of the category
        category_acronym:
          type: string
          description: Short acronym representing the category
        description:
          type: string
          description: Optional description of the category
      required:
        - id
        - category_name
        - category_acronym
    
    VocabularyItem:
      type: object
      properties:
        id:
          type: string
          description: Identifier for the vocabulary item
        category:
          type: string
          description: Category of the vocabulary item
        name:
          type: string
          description: Vocabulary item name

    Procedure:
      type: object
      properties:
        id:
          type: string
          description: Identifier for the procedure
          readOnly: true
        sample_pretreatment:
          type: string
          nullable: true
          description: Pretreatment applied before analysis
        technique:
          type: string
          nullable: true
          description: Analytical or experimental technique used
          enum:
            - calculated
            - lab procedure
            - spectral
        laboratory_method:
          type: string
          nullable: true
          description: The named laboratory method or protocol used to generate the result, including standard protocols or digestion/combustion approaches where applicable
        extractant_concentration:
          type: string
          nullable: true
          description: Extractant concentration details
        extraction_ratio:
          type: string
          nullable: true
          description: Ratio of sample to extractant used
        extraction_base:
          type: string
          nullable: true
          description: Base or solvent used in extraction
        measurement_procedure:
          type: string
          nullable: true
          description: Measurement procedure or instrument used for analysis
        limit_of_detection:
          type: string
          nullable: true
          description: Limit of detection for the measurement

    SoilRecord:
      type: object
      required:
        - geometry
      properties:
        sampling_date:
          anyOf:
            - type: string
              format: date
              nullable: true
            - type: string
              pattern: '^\d{4}(-\d{2}){0,2}$'
              nullable: true
        license:
          type: string
          nullable: true
        max_depth:
          type: number
          nullable: true
        min_depth:
          type: number
          nullable: true
        geometry:
          $ref: '#/components/schemas/Geometry'
      additionalProperties:
        anyOf:
          - type: string
            nullable: true
          - type: number
            nullable: true

    DataMapping:
      type: object
      required:
        - id
        - data_mapping
      properties:
        id:
          type: string
          description: Unique identifier for the data mapping
        data_mapping:
          $ref: '#/components/schemas/DataMappingObject'

    DataMappingObject:
      type: object
      additionalProperties:
        oneOf:
          - type: string
          - $ref: '#/components/schemas/PropertyMapping'
      description: >
        Dynamic object where keys are column names from the source data.
        Values can be either:
        - A string (for metadata columns like 'min_depth', 'max_depth', 'sampling_date', etc.)
        - A PropertyMapping object (for property columns with conversion/procedure info)
      example:
        magnesium:
          property_id: 'magnesium'
          procedure_id: 'sieved-over-2-mm-sieve-lab-procedure-water-h2o--01-05-weight-volume-electrode'
          conversion_id: 'cm'
        total_nitrogen:
          property_id: 'nitrogen-total'
        upper_depth: 'min_depth'
        lower_depth: 'max_depth'
        date: 'sampling_date'

    PropertyMapping:
      type: object
      required:
        - property_id
      properties:
        property_id:
          type: string
          description: ID of the soil property
        conversion_id:
          type: string
          description: Optional ID for unit conversion
        min_val:
          type: number
          description: Optional minimum value constraint
        max_val:
          type: number
          description: Optional maximum value constraint
        procedure_id:
          type: string
          description: Optional slug for the procedure

    DatasetFileMappingRequest:
      type: object
      properties:
        fileID:
          type: string
        mappingId:
          type: string
          format: uuid

    DatasetFileMappingResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileID:
          type: string
          format: uuid
        mappingId:
          type: string
          format: uuid

    BulkLoadJob:
      type: object
      properties:
        type:
          type: string
          enum: [bulk-load]
          description: Job type
        dataset_id:
          type: string

    ExportJob:
      type: object
      required:
        - type
        - filter_id
        - dataset_ids
        - format
      properties:
        type:
          type: string
          enum: [export]
          description: Job type
        anonymous:
          type: boolean
          description: Set to true to allow access without authentication
        filter_id:
          type: string
          format: uuid
          description: Filter ID to specify which data to export
        dataset_ids:
          type: array
          items:
            type: string
          description: list of dataset IDs to include in the export
        format:
          type: string
          enum: [csv, xlsx, gpkg, shp, geojson]
          description: Export file format
        public_homepage_url:
          type: string
          format: uri
          description: Optional URL pointing to platform homepage that will appear in Readme.PDF
        public_metadata_urls:
          type: object
          additionalProperties:
            type: string
            format: uri
          description: Optional mapping of dataset_id to metadata URL for Readme.PDF

    FileToDbJob:
      type: object
      properties:
        type:
          type: string
          enum: [file-to-db]
          description: Job type
        file_id:
          type: string
          description: File ID to be processed and inserted into the database

    BulkDeleteJob:
      type: object
      properties:
        type:
          type: string
          enum: [bulk-delete]
          description: Job type
        dataset_id:
          type: string

    Job:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the job
        queue:
          type: string
          description: Queue containing the job
        status:
          type: string
          enum: [created, retry, active, completed, cancelled, failed]
          description: Current status of the job
        created_by:
          type: string
          description: ID of the user who initiated the job
        created_at:
          type: string
          format: date-time
          description: Timestamp when the job was created
        completed_at:
          type: string
          format: date-time
          description: Timestamp when the job was completed
        data:
          oneOf:
            - $ref: '#/components/schemas/BulkLoadJob'
            - $ref: '#/components/schemas/ExportJob'
            - $ref: '#/components/schemas/FileToDbJob'
            - $ref: '#/components/schemas/BulkDeleteJob'

    License:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        full_name:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - created_at

    RasterFilter:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        mappings:
          type: object
          nullable: true

    Entitlements:
      type: object
