openapi: 3.0.3
info:
  title: SoilHive core API
  version: 1.0.0
servers:
  - url: /api/v1
  - url: /

paths:
  /entitlements:
    get:
      x-eov-operation-handler: controllers/entitlements
      x-eov-operation-id: getUserEntitlements
      summary: Get user entitlements
      security:
        - bearerAuth: []
      tags:
        - auth
      responses:
        '200':
          description: List of user entitlements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entitlements'

  /auth/config:
    get:
      x-eov-operation-handler: controllers/auth
      x-eov-operation-id: getConfig
      summary: Retrieve authentication configuration
      tags:
        - auth
      responses:
        '200':
          description: Authentication configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfig'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /oauth/token:
    post:
      x-eov-operation-handler: controllers/auth
      x-eov-operation-id: getToken
      summary: Obtain JWT token using password grant
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum:
                    - password
                  description: The OAuth2 grant type (only password is supported)
                username:
                  type: string
                  description: Username (required for password grant, value is ignored)
                password:
                  type: string
                  format: password
                  description: Password (required for password grant)
              required:
                - grant_type
                - password
      responses:
        '200':
          description: JWT token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
  /config/{configId}:
    parameters:
      - name: configId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier for the configuration
    put:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: putConfig
      summary: Create or update configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigItem'
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigItem'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: getConfig
      summary: Retrieve configuration item
      tags:
        - config
      responses:
        '200':
          description: Configuration object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigItem'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: deleteConfig
      summary: Delete configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        '204':
          description: Configuration deleted successfully

  /config-export:
    post:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: exportConfigs
      summary: Exports all configuration items
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        '200':
          description: Object containing all the stored configurations

  /frontend/logo:
    post:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: logoUpload
      summary: Upload platform logo
      tags:
        - frontend
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
            encoding:
              file:
                contentType: image/svg+xml
      responses:
        '201':
          description: Logo uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDescriptor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
      security:
        - bearerAuth: [super-admin]
    get:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: logoDownload
      summary: Download platform logo
      tags:
        - frontend
      responses:
        '200':
          description: Logo downloaded successfully
        '404':
          $ref: '#/components/responses/NotFound'
          description: Custom logo not found
    delete:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: logoDelete
      summary: Remove custom logo
      tags:
        - frontend
      security:
        - bearerAuth: [super-admin]
      responses:
        '204':
          description: Logo deleted successfully

  /epsg:
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getEpsgCodes
      summary: Get supported EPSG codes
      tags:
        - datasets
      responses:
        '200':
          description: EPSG code array
          content:
            application/json:
              schema:
                type: array
                items:
                  type: number
  /datasets:
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getDatasets
      x-entitlements-required: true
      summary: Get metadata for all datasets
      tags:
        - datasets
      responses:
        '200':
          description: Dataset array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'
    post:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: createDataset
      summary: Create a new dataset
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDatasetInput'
      responses:
        '200':
          description: Dataset created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /datasets/{datasetId}:
    parameters:
      - name: datasetId
        in: path
        required: true
        schema:
          type: string
        description: Dataset ID
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getDataset
      x-entitlements-required: true
      summary: Get metadata for a specific dataset
      tags:
        - datasets
      responses:
        '200':
          description: Dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'

    patch:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: updateDataset
      summary: Update an existing dataset
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Dataset'
      responses:
        '200':
          description: Dataset updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: deleteDataset
      summary: Delete a specific dataset
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          description: The ID of the dataset to delete
          schema:
            type: string
      responses:
        '204':
          description: Dataset successfully deleted (no content returned)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /jobs:
    post:
      x-eov-operation-handler: controllers/jobs
      x-eov-operation-id: postJob
      x-entitlements-required: true
      summary: Starts async job
      tags:
        - jobs
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/BulkLoadJob'
                - $ref: '#/components/schemas/ExportJob'
                - $ref: '#/components/schemas/FileToDbJob'
                - $ref: '#/components/schemas/BulkDeleteJob'
              discriminator:
                propertyName: type
                mapping:
                  bulk-load: '#/components/schemas/BulkLoadJob'
                  export: '#/components/schemas/ExportJob'
                  file-to-db: '#/components/schemas/FileToDbJob'
                  bulk-delete: '#/components/schemas/BulkDeleteJob'
      responses:
        '201':
          description: Async job started successfull
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    get:
      x-eov-operation-handler: controllers/jobs
      x-eov-operation-id: getJobs
      summary: Get all async jobs for the user
      tags:
        - jobs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Job array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /jobs/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: ID of the async job
    get:
      x-eov-operation-handler: controllers/jobs
      x-eov-operation-id: getJobById
      summary: Get async job status
      tags:
        - jobs
      security:
        - bearerAuth: []
        - {}
      responses:
        '200':
          description: Job status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      x-eov-operation-handler: controllers/jobs
      x-eov-operation-id: deleteJobById
      summary: Cancel async job
      tags:
        - jobs
      security:
        - bearerAuth: []
        - {}
      responses:
        '204':
          description: Job canceled successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /datasets/{datasetId}/dataset-file-mapping:
    get:
      x-eov-operation-handler: controllers/dataset-file-mappings
      x-eov-operation-id: getDatasetFileMappings
      summary: Get all dataset file mappings for a dataset
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: fileId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional file ID to filter mappings
      responses:
        '200':
          description: List of dataset file mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DatasetFileMappingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      x-eov-operation-handler: controllers/dataset-file-mappings
      x-eov-operation-id: createDatasetFileMapping
      summary: Creates a dataset-file-mapping triplet (or placeholder)
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetFileMappingRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetFileMappingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized - Token subject is missing
    delete:
      x-eov-operation-handler: controllers/dataset-file-mappings
      x-eov-operation-id: deleteDatasetFileMappingByFileId
      summary: Delete a dataset file mapping by file ID
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: fileId
          in: query
          required: true
          schema:
            type: string
          description: File ID whose mapping should be deleted
      responses:
        '204':
          description: Dataset file mapping deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /datasets/{datasetId}/dataset-file-mapping/{datasetFileMappingId}:
    get:
      x-eov-operation-handler: controllers/dataset-file-mappings
      x-eov-operation-id: getDatasetFileMapping
      summary: Get a specific dataset file mapping
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
        - name: datasetFileMappingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Dataset file mapping ID
      responses:
        '200':
          description: Dataset file mapping retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetFileMappingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      x-eov-operation-handler: controllers/dataset-file-mappings
      x-eov-operation-id: updateDatasetFileMapping
      summary: Updates a dataset-file-mapping triplet (or placeholder)
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
        - name: datasetFileMappingId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetFileMappingRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetFileMappingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthorized - Token subject is missing

  /datasets/{datasetId}/files:
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getDatasetFiles
      summary: Get all dataset files
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
      responses:
        '200':
          description: List of dataset files
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileDescriptor'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /datasets/{datasetId}/mappings:
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getDatasetMappings
      summary: Get all dataset mappings
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
      responses:
        '200':
          description: List of dataset mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DataMapping'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /datasets/{datasetId}/entitlements:
    get:
      x-eov-operation-handler: controllers/entitlements
      x-eov-operation-id: getDatasetEntitlements
      summary: Get all dataset entitlements
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
          description: Dataset ID
      responses:
        '200':
          description: List of dataset entitlements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entitlements'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      x-eov-operation-handler: controllers/entitlements
      x-eov-operation-id: setDatasetEntitlement
      summary: Edits a dataset entitlement
      tags:
        - datasets
      security:
        - bearerAuth: [data-admin]
      parameters:
        - name: datasetId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Entitlements'
      responses:
        '200':
          description: Update successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Entitlements'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /soil-properties:
    get:
      x-eov-operation-handler: controllers/soil-properties
      x-eov-operation-id: getSoilProperties
      summary: Get metadata for all soil properties
      tags:
        - soil-properties
      responses:
        '200':
          description: Soil property array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SoilProperty'

  /soil-properties/{soilPropertyId}:
    parameters:
      - name: soilPropertyId
        in: path
        required: true
        schema:
          type: string
        description: Soil property ID
    get:
      x-eov-operation-handler: controllers/soil-properties
      x-eov-operation-id: getSoilProperty
      summary: Get metadata for a specific soil property
      tags:
        - soil-properties
      responses:
        '200':
          description: Dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoilProperty'

  /soil-property-categories:
    get:
      x-eov-operation-handler: controllers/soil-property-categories
      x-eov-operation-id: getSoilPropertyCategories
      summary: Get soil property categories
      tags:
        - soil-properties
      responses:
        '200':
          description: Array of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SoilPropertyCategory'

  /soil-property-categories/{soilPropertyCategoryId}:
    parameters:
      - name: soilPropertyCategoryId
        in: path
        required: true
        schema:
          type: string
        description: Soil property category ID
    get:
      x-eov-operation-handler: controllers/soil-property-categories
      x-eov-operation-id: getSoilPropertyCategory
      summary: Get specific soil property category
      tags:
        - soil-properties
      responses:
        '200':
          description: Dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoilPropertyCategory'

  /procedures:
    get:
      x-eov-operation-handler: controllers/procedures
      x-eov-operation-id: getProcedures
      summary: Get all procedures
      tags:
        - procedures
      responses:
        '200':
          description: Array of procedures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Procedure'
    post:
      x-eov-operation-handler: controllers/procedures
      x-eov-operation-id: createProcedure
      summary: Create a procedure
      tags:
        - procedures
      security:
        - bearerAuth: [data-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Procedure'
      responses:
        '201':
          description: Procedure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Procedure'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /procedures/techniques:
    get:
      x-eov-operation-handler: controllers/procedures
      x-eov-operation-id: getProcedureTechniques
      summary: Get available procedure technique values
      tags:
        - procedures
      responses:
        '200':
          description: Array of technique values
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  enum:
                    - lab procedure
                    - spectral
                    - calculated

  /procedures/{procedureId}:
    parameters:
      - name: procedureId
        in: path
        required: true
        schema:
          type: string
        description: Procedure ID
    get:
      x-eov-operation-handler: controllers/procedures
      x-eov-operation-id: getProcedure
      summary: Get a procedure by ID
      tags:
        - procedures
      responses:
        '200':
          description: Procedure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Procedure'

  /vocabulary:
    get:
      x-eov-operation-handler: controllers/vocabularies
      x-eov-operation-id: getVocabulary
      summary: Get all vocabulary items
      tags:
        - vocabulary
      responses:
        '200':
          description: Array of vocabulary items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VocabularyItem'
    post:
      x-eov-operation-handler: controllers/vocabularies
      x-eov-operation-id: createVocabulary
      summary: Create a vocabulary item
      tags:
        - vocabulary
      security:
        - bearerAuth: [data-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - category
              properties:
                name:
                  type: string
                category:
                  type: string
                  enum:
                    - sample_pretreatment
                    - laboratory_method
                    - extractant_concentration
                    - extraction_ratio
                    - extraction_base
                    - measurement_procedure
                    - limit_of_detection
      responses:
        '201':
          description: Vocabulary item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VocabularyItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /vocabulary/{vocabularyId}:
    parameters:
      - name: vocabularyId
        in: path
        required: true
        schema:
          type: string
        description: Vocabulary item ID
    get:
      x-eov-operation-handler: controllers/vocabularies
      x-eov-operation-id: getVocabularyItem
      summary: Get a vocabulary item by ID
      tags:
        - vocabulary
      responses:
        '200':
          description: Vocabulary item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VocabularyItem'
        '404':
          $ref: '#/components/responses/NotFound'

  /licenses:
    get:
      x-eov-operation-handler: controllers/licenses
      x-eov-operation-id: getLicenses
      summary: Get licenses
      tags:
        - licenses
      responses:
        '200':
          description: Array of licenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/License'

  /licenses/{licenseId}:
    parameters:
      - name: licenseId
        in: path
        required: true
        schema:
          type: string
        description: License ID
    get:
      x-eov-operation-handler: controllers/licenses
