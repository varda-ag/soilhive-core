      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataMappingObject'
      responses:
        '201':
          description: Data mapping created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataMapping'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /mappings/{mappingId}:
    parameters:
      - name: mappingId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Data mapping ID
    get:
      x-eov-operation-handler: controllers/mappings
      x-eov-operation-id: getDataMapping
      summary: Get a specific data mapping
      tags:
        - mappings
      security:
        - bearerAuth: [data-admin]
      responses:
        '200':
          description: Data mapping retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataMapping'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      x-eov-operation-handler: controllers/mappings
      x-eov-operation-id: deleteDataMapping
      summary: Delete mapping item
      tags:
        - mappings
      security:
        - bearerAuth: [data-admin]
      responses:
        '204':
