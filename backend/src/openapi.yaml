openapi: 3.0.3
info:
  title: SoilHive core API
  version: 1.0.0

paths:
  /auth/config:
    get:
      x-eov-operation-handler: controllers/auth
      x-eov-operation-id: getConfig
      summary: Retrieve authentication configuration
      tags:
        - auth
      responses:
        "200":
          description: Authentication configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfig"
        "404":
          description: Configuration not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /oauth/token:
    post:
      x-eov-operation-handler: controllers/auth
      x-eov-operation-id: getToken
      summary: Obtain JWT token using password grant
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum:
                    - password
                  description: The OAuth2 grant type (only password is supported)
                username:
                  type: string
                  description: Username (required for password grant, value is ignored)
                password:
                  type: string
                  format: password
                  description: Password (required for password grant)
              required:
                - grant_type
                - password
      responses:
        "200":
          description: JWT token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
  /config/{configId}:
    parameters:
      - name: configId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier for the configuration
    put:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: putConfig
      summary: Create or update configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigItem"
      responses:
        "200":
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigItem"
        "400":
          description: Invalid input data
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: getConfig
      summary: Retrieve configuration item
      tags:
        - config
      responses:
        "200":
          description: Configuration object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigItem"
        "404":
          description: Configuration not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: deleteConfig
      summary: Delete configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        "204":
          description: Configuration deleted successfully

  /config-export:
    post:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: exportConfigs
      summary: Exports all configuration items
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        "200":
          description: Object containing all the stored configurations

  /frontend/logo:
    post:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileUpload
      summary: Upload platform logo
      tags:
        - frontend
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
            encoding:
              file:
                contentType: image/svg+xml
      responses:
        "201":
          description: Logo uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileDescriptor"
        "400":
          $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/schemas/ErrorResponse"
        "409":
          $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: [super-admin]
    get:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: logoDownload
      summary: Download platform logo
      tags:
        - frontend
      responses:
        "200":
          description: Logo downloaded successfully
    delete:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: logoDelete
      summary: Remove custom logo
      tags:
        - frontend
      security:
        - bearerAuth: [super-admin]
      responses:
        "204":
          description: Logo deleted successfully

  /datasets/filters:
    post:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: postDatasetsFilters
      summary: Creates a new filter and retrieves information about datasets matching it
      tags:
        - datasets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: "#/components/schemas/DatasetFilter"
      responses:
        "201":
          description: Filter created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDatasetFilterResponse"
        "400":
          $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/schemas/ErrorResponse"

  /files/{fileId}:
    parameters:
      - name: fileId
        in: path
        required: true
        schema:
          type: string
        description: Unique file identifier. Folder separators should be encoded as %2F
    post:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileUpload
      summary: Upload a file
      tags:
        - TODO (to be removed or specialized)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileDescriptor"
        "400":
          $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/schemas/ErrorResponse"
        "409":
          $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: [super-admin, data-admin]

    get:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileDownload
      summary: Download a file
      tags:
        - TODO (to be removed or specialized)
      parameters:
        - in: query
          name: token
          required: false
          description: Temporary access token to download access-protected files
          schema:
            type: string
      responses:
        "200":
          description: File downloaded successfully

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthConfig:
      type: object
      required:
        - authMode
      properties:
        authMode:
          type: string
          description: Authentication mode type
        oidcConfig:
          $ref: "#/components/schemas/OIDCConfig"

    OIDCConfig:
      type: object
      required:
        - authority
        - clientId
        - redirectUri
        - postLogoutRedirectUri
        - silentRedirectUri
        - scope
      properties:
        authority:
          type: string
        clientId:
          type: string
        redirectUri:
          type: string
        postLogoutRedirectUri:
          type: string
        silentRedirectUri:
          type: string
        scope:
          type: string

    ConfigItem:
      type: object

    ErrorResponse:
      type: object
      required:
        - title
        - status
        - detail
        - instance
      properties:
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: "Not Found"
        status:
          type: integer
          description: The HTTP status code
          example: 404
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: "The requested configuration resource was not found."
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence of the problem. It may yield further information if dereferenced.

    FileDescriptor:
      type: object
      properties:
        id:
          type: string
          description: Internal file identifier
        key:
          type: string
          description: Storage key (path-like)
        size:
          type: integer
          description: File size in bytes
        mimeType:
          type: string
          description: MIME type of the file
        uploadedAt:
          type: string
          format: date-time
          description: Upload timestamp
        metadata:
          type: object
          additionalProperties: true
      required:
        - id
        - key
        - size
        - mimeType
        - uploadedAt

    FilterableDatasetMetadata:
      type: object
      properties:
        licenses:
          type: array
          items:
            type: string
        min_sampling_date:
          type: string
        max_sampling_date:
          type: string
        min_depth:
          type: number
        max_depth:
          type: number
        horizons:
          type: array
          items:
            type: string
        soil_properties:
          type: array
          items:
            type: string
        agroecological_zones:
          type: array
          items:
            type: string
        land_cover:
          type: array
          items:
            type: string
        soil_groups:
          type: array
          items:
            type: string
      required:
        - geometry

    DatasetFilter:
      allOf:
      - $ref: "#/components/schemas/FilterableDatasetMetadata"
      - type: object
        properties:
          geometry:
            type: object
            description: Geometry (in GeoJSON format) defining the area of interest. Allowed types are Polygon and MultiPolygon
        required:
          - geometry

    FilteredDataset:
      allOf:
        - $ref: "#/components/schemas/FilterableDatasetMetadata"
        - type: object
          properties:
            id:
              type: string
              description: Dataset identifier
            feature_count:
              type: integer
              description: Number of features matching the filter in this dataset
            data_type:
              type: string
              description: Type of data contained in the dataset (e.g., point samples, raster data)
          required:
            - id
            - feature_count
            - data_type

    PostDatasetFilterResponse:
      type: object
      properties:
        id:
          type: string
          description: Filter identifier
        name:
          type: string
          description: Human readable name for the filter
        filter:
          $ref: "#/components/schemas/DatasetFilter"
        datasets:
          type: array
          items:
            $ref: "#/components/schemas/FilteredDataset"
