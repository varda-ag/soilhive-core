openapi: 3.0.3
info:
  title: SoilHive core API
  version: 1.0.0

paths:
  /oauth/token:
    post:
      x-eov-operation-handler: controllers/auth
      x-eov-operation-id: getToken
      summary: Obtain JWT token using password grant
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum:
                    - password
                  description: The OAuth2 grant type (only password is supported)
                username:
                  type: string
                  description: Username (required for password grant, value is ignored)
                password:
                  type: string
                  format: password
                  description: Password (required for password grant)
              required:
                - grant_type
                - password
      responses:
        "200":
          description: JWT token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
  /config/{configId}:
    parameters:
      - name: configId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier for the configuration
    put:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: putConfig
      summary: Create or update configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigItem"
      responses:
        "200":
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigItem"
        "400":
          description: Invalid input data
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: getConfig
      summary: Retrieve configuration item
      tags:
        - config
      responses:
        "200":
          description: Configuration object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigItem"
        "404":
          description: Configuration not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: deleteConfig
      summary: Delete configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        "204":
          description: Configuration deleted successfully

  /config-export:
    post:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: exportConfigs
      summary: Exports all configuration items
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        "200":
          description: Object containing all the stored configurations

  /files/{fileId}:
    parameters:
      - name: fileId
        in: path
        required: true
        schema:
          type: string
        description: Unique file identifier
    post:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileUpload
      summary: Upload a file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "201":
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileDescriptor"
        "400":
          $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/schemas/ErrorResponse"
        "409":
          $ref: "#/components/schemas/ErrorResponse"
      security:
        - bearerAuth: [super-admin, data-admin]
    get:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileDownload
      summary: Download a file
      parameters:
        - in: query
          name: token
          required: false
          description: Temporary access token to download access-protected files
          schema:
            type: string
      responses:
        "200":
          description: File downloaded successfully

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ConfigItem:
      type: object

    ErrorResponse:
      type: object
      required:
        - title
        - status
        - detail
        - instance
      properties:
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: "Not Found"
        status:
          type: integer
          description: The HTTP status code
          example: 404
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: "The requested configuration resource was not found."
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence of the problem. It may yield further information if dereferenced.

    FileDescriptor:
      type: object
      properties:
        id:
          type: string
          description: Internal file identifier
        key:
          type: string
          description: Storage key (path-like)
        size:
          type: integer
          description: File size in bytes
        mimeType:
          type: string
          description: MIME type of the file
        uploadedAt:
          type: string
          format: date-time
          description: Upload timestamp
        metadata:
          type: object
          additionalProperties: true
      required:
        - id
        - key
        - size
        - mimeType
        - uploadedAt
