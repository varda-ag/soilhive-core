  /downloads/{filePath}:
    get:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: download
      summary: Download a file with temporary access token
      tags:
        - files
      parameters:
        - in: query
          name: token
          required: true
          description: Temporary access token to download access-protected files
          schema:
            type: string
        - in: query
          name: filename
          required: false
          description: Override the Content-Disposition filename sent to the browser
          schema:
            type: string
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: File path. Folder separators should be encoded as %2F
      responses:
        '200':
          description: File downloaded successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '410':
