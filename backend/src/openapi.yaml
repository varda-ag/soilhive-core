openapi: 3.0.3
info:
  title: SoilHive core API
  version: 1.0.0
servers:
  - url: /v1
  - url: /

paths:
  /auth/config:
    get:
      x-eov-operation-handler: controllers/auth
      x-eov-operation-id: getConfig
      summary: Retrieve authentication configuration
      tags:
        - auth
      responses:
        '200':
          description: Authentication configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfig'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /oauth/token:
    post:
      x-eov-operation-handler: controllers/auth
      x-eov-operation-id: getToken
      summary: Obtain JWT token using password grant
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  enum:
                    - password
                  description: The OAuth2 grant type (only password is supported)
                username:
                  type: string
                  description: Username (required for password grant, value is ignored)
                password:
                  type: string
                  format: password
                  description: Password (required for password grant)
              required:
                - grant_type
                - password
      responses:
        '200':
          description: JWT token response
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                  expires_in:
                    type: integer
  /config/{configId}:
    parameters:
      - name: configId
        in: path
        required: true
        schema:
          type: string
        description: Unique identifier for the configuration
    put:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: putConfig
      summary: Create or update configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigItem'
      responses:
        '200':
          description: Configuration updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigItem'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: getConfig
      summary: Retrieve configuration item
      tags:
        - config
      responses:
        '200':
          description: Configuration object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigItem'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: deleteConfig
      summary: Delete configuration item
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        '204':
          description: Configuration deleted successfully

  /config-export:
    post:
      x-eov-operation-handler: controllers/config
      x-eov-operation-id: exportConfigs
      summary: Exports all configuration items
      tags:
        - config
      security:
        - bearerAuth: [super-admin]
      responses:
        '200':
          description: Object containing all the stored configurations

  /frontend/logo:
    post:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileUpload
      summary: Upload platform logo
      tags:
        - frontend
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
            encoding:
              file:
                contentType: image/svg+xml
      responses:
        '201':
          description: Logo uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDescriptor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
      security:
        - bearerAuth: [super-admin]
    get:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: logoDownload
      summary: Download platform logo
      tags:
        - frontend
      responses:
        '200':
          description: Logo downloaded successfully
    delete:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: logoDelete
      summary: Remove custom logo
      tags:
        - frontend
      security:
        - bearerAuth: [super-admin]
      responses:
        '204':
          description: Logo deleted successfully

  /datasets:
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getDatasets
      summary: Get metadata for all datasets
      tags:
        - datasets
      responses:
        '200':
          description: Dataset array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dataset'

  /datasets/{datasetSlug}:
    parameters:
      - name: datasetSlug
        in: path
        required: true
        schema:
          type: string
        description: Dataset slug
    get:
      x-eov-operation-handler: controllers/datasets
      x-eov-operation-id: getDataset
      summary: Get metadata for a specific dataset
      tags:
        - datasets
      responses:
        '200':
          description: Dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dataset'

  /soil-properties:
    get:
      x-eov-operation-handler: controllers/soil-properties
      x-eov-operation-id: getSoilProperties
      summary: Get metadata for all soil properties
      tags:
        - soil-properties
      responses:
        '200':
          description: Soil property array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SoilProperty'

  /soil-properties/{soilPropertySlug}:
    parameters:
      - name: soilPropertySlug
        in: path
        required: true
        schema:
          type: string
        description: Soil property slug
    get:
      x-eov-operation-handler: controllers/soil-properties
      x-eov-operation-id: getSoilProperty
      summary: Get metadata for a specific soil property
      tags:
        - soil-properties
      responses:
        '200':
          description: Dataset information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoilProperty'

  /data-filters:
    post:
      x-eov-operation-handler: controllers/data-filters
      x-eov-operation-id: postDataFilters
      summary: Creates a new data filter
      tags:
        - data-filters
      security:
        - bearerAuth: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataFilter'
      responses:
        '201':
          description: Filter created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredDataFilter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      x-eov-operation-handler: controllers/data-filters
      x-eov-operation-id: getDataFilters
      summary: Retrieves all data filters owned by the user
      tags:
        - data-filters
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of data filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StoredDataFilter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /data-filters/{filterId}:
    parameters:
      - name: filterId
        in: path
        required: true
        schema:
          type: string
        description: Unique filter identifier
    get:
      x-eov-operation-handler: controllers/data-filters
      x-eov-operation-id: getDataFilterById
      summary: Retrieves a filter by ID
      tags:
        - data-filters
      responses:
        '200':
          description: Filter information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StoredDataFilter'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /data-filters/{filterId}/coverage:
    parameters:
      - name: filterId
        in: path
        required: true
        schema:
          type: string
        description: Unique filter identifier
    get:
      x-eov-operation-handler: controllers/data-filters
      x-eov-operation-id: getDataFilterCoverage
      summary: Retrieves what data is available for the given filter
      tags:
        - data-filters
      security:
        - bearerAuth: []
        - {}
      responses:
        '200':
          description: List of datasets matching the filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilteredDatasetsList'
        '404':
          $ref: '#/components/responses/NotFound'

  /soil-data:
    get:
      x-eov-operation-handler: controllers/soil-data
      x-eov-operation-id: getSoilData
      summary: Retrieves soil data
      tags:
        - soil-data
      security:
        - bearerAuth: []
        - {}
      parameters:
        - in: query
          name: datasets
          required: true
          description: Slugs of datasets to retrieve data from (comma-separated)
          schema:
            type: array
            items:
              type: string
          explode: false
        - in: query
          name: filterId
          required: false
          description: ID of a stored data filter to apply
          schema:
            type: string
          explode: false
        - in: query
          name: limit
          required: true
          description: Number of items in the response
          schema:
            type: number
            default: 100
        - in: query
          name: cursor
          required: false
          description: Pagination cursor
          schema:
            type: string
      responses:
        '200':
          description: Soil data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SoilDataSample'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /files/{fileId}:
    parameters:
      - name: fileId
        in: path
        required: true
        schema:
          type: string
        description: Unique file identifier. Folder separators should be encoded as %2F
    post:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileUpload
      summary: Upload a file
      tags:
        - TODO (to be removed or specialized)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        '201':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileDescriptor'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
      security:
        - bearerAuth: [super-admin, data-admin]

    get:
      x-eov-operation-handler: controllers/files
      x-eov-operation-id: fileDownload
      summary: Download a file
      tags:
        - TODO (to be removed or specialized)
      parameters:
        - in: query
          name: token
          required: false
          description: Temporary access token to download access-protected files
          schema:
            type: string
      responses:
        '200':
          description: File downloaded successfully

components:
  responses:
    NotFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthConfig:
      type: object
      required:
        - authMode
      properties:
        authMode:
          type: string
          description: Authentication mode type
        oidcConfig:
          $ref: '#/components/schemas/OIDCConfig'

    OIDCConfig:
      type: object
      required:
        - authority
        - clientId
        - redirectUri
        - postLogoutRedirectUri
        - silentRedirectUri
        - scope
      properties:
        authority:
          type: string
        clientId:
          type: string
        redirectUri:
          type: string
        postLogoutRedirectUri:
          type: string
        silentRedirectUri:
          type: string
        scope:
          type: string

    ConfigItem:
      type: object

    ErrorResponse:
      type: object
      required:
        - title
        - status
        - detail
        - instance
      properties:
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: 'Not Found'
        status:
          type: integer
          description: The HTTP status code
          example: 404
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: 'The requested configuration resource was not found.'
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence of the problem. It may yield further information if dereferenced.

    FileDescriptor:
      type: object
      properties:
        id:
          type: string
          description: Internal file identifier
        key:
          type: string
          description: Storage key (path-like)
        size:
          type: integer
          description: File size in bytes
        mimeType:
          type: string
          description: MIME type of the file
        uploadedAt:
          type: string
          format: date-time
          description: Upload timestamp
        metadata:
          type: object
          additionalProperties: true
      required:
        - id
        - key
        - size
        - mimeType
        - uploadedAt

    FilterCriteria:
      type: object
      properties:
        data_types:
          type: array
          items:
            type: string
            description: Type of data contained in the dataset (e.g., point samples, raster data)
        licenses:
          type: array
          items:
            type: string
        min_sampling_date:
          type: string
        max_sampling_date:
          type: string
        min_depth:
          type: number
        max_depth:
          type: number
        horizons:
          type: array
          items:
            type: string
        soil_properties:
          type: array
          items:
            type: string
        raster_filters:
          type: object
          additionalProperties:
            type: array
            items:
              type: number

    DataFilter:
      type: object
      properties:
        geometries:
          type: array
          items:
            $ref: '../src/GeoJSON-OAS3.yaml#/components/schemas/Geometry'
        parameters:
          $ref: '#/components/schemas/FilterCriteria'
      required:
        - geometries
        - parameters

    FilteredDataset:
      allOf:
        - $ref: '#/components/schemas/FilterCriteria'
        - type: object
          properties:
            id:
              type: string
              description: Dataset identifier
            dataset_layer_count:
              type: integer
              description: Number of features matching the filter in this dataset
          required:
            - id
            - name
            - dataset_layer_count

    StoredDataFilter:
      type: object
      properties:
        id:
          type: string
          description: Filter identifier
        name:
          type: string
          description: Human readable name for the filter
        filter:
          $ref: '#/components/schemas/DataFilter'

    FilteredDatasetsList:
      type: array
      items:
        $ref: '#/components/schemas/FilteredDataset'

    SoilDataSample:
      type: object
      properties:
        dataset:
          type: string
        soil_property:
          type: string
        value:
          type: number

    VariableMeasured:
      type: object
      properties:
        description:
          type: string
        soil_parameter:
          type: string
        sample_pretreatment:
          type: string
          nullable: true
        technique:
          type: string
          nullable: true
        extractant_formulation:
          type: string
          nullable: true
        extractant_concentration:
          type: string
          nullable: true
        extraction_ratio:
          type: string
          nullable: true
        extraction_base:
          type: string
          nullable: true
        instrument:
          type: string
          nullable: true
        limit_of_detection:
          type: string
          nullable: true
        soil_parameter_code:
          type: string
        unit_of_measurement:
          type: string
          nullable: true
      required:
        - description
        - soil_parameter
        - soil_parameter_code

    Dataset:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        full_name:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        data_producer:
          type: string
          nullable: true
        variables_measured:
          type: array
          items:
            $ref: '#/components/schemas/VariableMeasured'
          nullable: true
        spatial_resolution:
          type: string
          nullable: true
        publication_date:
          type: string
          format: date
          nullable: true
        reference_period_start:
          type: string
          format: date
          nullable: true
        reference_period_stop:
          type: string
          format: date
          nullable: true
        licenses:
          type: array
          items:
            type: string
          nullable: true
        citation:
          type: string
          nullable: true
        geographical_extent:
          type: string
          nullable: true
        gis_datatype:
          type: string
          nullable: true
        spatial_extent:
          type: object
          # TODO: this triggers an OpenApiValidator bug
          # $ref: "../src/GeoJSON-OAS3.yaml#/components/schemas/Polygon"
        n_observations:
          type: string
          nullable: true
        n_raster_layers:
          type: integer
          nullable: true
        soil_depth:
          type: object
          nullable: true
        status:
          type: string
        is_archived:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
        updated_by:
          type: string
          nullable: true
        service_location:
          type: string
          nullable: true
      required:
        - id
        - slug
        - name
        - spatial_extent
        - status
        - is_archived
        - created_at
        - created_by

    SoilProperty:
      type: object
      required:
        - id
        - slug
        - property_name
        - property_acronym
        - category_id
      properties:
        id:
          type: string
          description: Unique identifier
        slug:
          type: string
          description: URL-friendly identifier
        property_name:
          type: string
          description: Human-readable name
        property_acronym:
          type: string
          description: Abbreviation
        description:
          type: string
          nullable: true
          description: Optional description
        standard_unit:
          type: string
          nullable: true
          description: Standard unit
        property_level:
          type: integer
          nullable: true
          description: Hierarchical level
        parent_property_id:
          type: string
          nullable: true
          description: Parent property ID, if applicable
        category_id:
          type: string
          description: Category identifier
