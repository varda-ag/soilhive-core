      x-eov-operation-handler: controllers/raster-filters
      x-eov-operation-id: getRasterFilters
      summary: Get raster filters
      tags:
        - raster-filters
      responses:
        '200':
          description: Array of raster filters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RasterFilter'

  /raster-filters/{rasterFilterId}:
    parameters:
      - name: rasterFilterId
        in: path
        required: true
