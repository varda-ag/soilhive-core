        - cursor

    MeasuredProperty:
      type: object
      properties:
        soil_property_id:
          type: string
        procedure_id:
          type: string

    CreateDatasetInput:
      allOf:
        - $ref: '#/components/schemas/Dataset'
      required:
        - name

    Dataset:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        full_name:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        author:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        data_producer:
          type: string
          nullable: true
        measured_properties:
          type: array
          items:
            $ref: '#/components/schemas/MeasuredProperty'
          readOnly: true
        spatial_resolution:
          type: string
          nullable: true
        publication_date:
          type: string
          format: date
          nullable: true
        reference_period_start:
          type: string
          format: date
          nullable: true
        reference_period_stop:
          type: string
          format: date
          nullable: true
        licenses:
          type: array
          items:
            type: string
          nullable: true
        citation:
          type: string
          nullable: true
        geographical_extent:
          type: string
          nullable: true
        gis_datatype:
          type: string
          nullable: true
        spatial_extent:
          type: object
          nullable: true
          # TODO: this triggers an OpenApiValidator bug
          # $ref: "../src/GeoJSON-OAS3.yaml#/components/schemas/Polygon"
        n_observations:
          type: string
          nullable: true
        n_raster_layers:
          type: integer
          nullable: true
        soil_depth:
          type: object
          nullable: true
        status:
          type: string
          readOnly: true
        is_archived:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          readOnly: true
        updated_by:
          type: string
          readOnly: true
        service_location:
          type: string
          nullable: true

    SoilProperty:
      type: object
      required:
        - id
        - property_name
        - property_acronym
        - category_id
      properties:
        id:
          type: string
          description: Unique identifier
        property_name:
          type: string
          description: Human-readable name
        property_acronym:
          type: string
          description: Abbreviation
        description:
          type: string
          nullable: true
          description: Optional description
        standard_unit:
          type: string
          nullable: true
          description: Standard unit
        property_level:
          type: integer
          nullable: true
          description: Hierarchical level
        parent_property_id:
          type: string
          nullable: true
          description: Parent property ID, if applicable
        category_id:
          type: string
          description: Category identifier

    SoilRecord:
      type: object
      required:
        - geometry
      properties:
        sampling_date:
          type: string
          format: date
          nullable: true
        license:
          type: string
          nullable: true
        horizon:
          type: string
          nullable: true
        max_depth:
          type: number
          nullable: true
        min_depth:
          type: number
          nullable: true
        geometry:
          $ref: '#/components/schemas/Geometry'
      additionalProperties:
        oneOf:
          - type: string
            nullable: true
          - type: number
            nullable: true

    DataMapping:
      type: object
      required:
        - id
        - data_mapping
      properties:
        id:
          type: string
          description: Unique identifier for the data mapping
        data_mapping:
          $ref: '#/components/schemas/DataMappingObject'
    DataMappingObject:
      type: object
      additionalProperties:
        oneOf:
          - type: string
          - $ref: '#/components/schemas/PropertyMapping'
      description: >
        Dynamic object where keys are column names from the source data.
        Values can be either:
        - A string (for metadata columns like 'min_depth', 'max_depth', 'sampling_date', etc.)
        - A PropertyMapping object (for property columns with conversion/procedure info)
      example:
        magnesium:
          property_id: 'magnesium'
          procedure_id: 'sieved-over-2-mm-sieve-lab-procedure-water-h2o--01-05-weight-volume-electrode'
          conversion_id: 'cm'
        total_nitrogen:
          property_id: 'nitrogen-total'
        upper_depth: 'min_depth'
        lower_depth: 'max_depth'
        date: 'sampling_date'

    PropertyMapping:
      type: object
      required:
        - property_id
      properties:
        property_id:
          type: string
          description: ID of the soil property
        conversion_id:
          type: string
          description: Optional ID for unit conversion
        min_val:
          type: number
          description: Optional minimum value constraint
        max_val:
          type: number
          description: Optional maximum value constraint
        procedure_id:
          type: string
          description: Optional slug for the procedure

    BulkLoad:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the bulk load job
        dataset_id:
          type: string
          description: ID of the dataset the job is associated with
        status:
          type: string
          enum: [pending, in_progress, completed, failed, canceled]
          description: Current status of the bulk load job
        created_by:
          type: string
          description: ID of the user who initiated the job
        created_at:
          type: string
          format: date-time
          description: Timestamp when the job was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the job was last updated
        completed_at:
          type: string
          format: date-time
          description: Timestamp when the job was completed
        failed_at:
          type: string
          format: date-time
          description: Timestamp when the job failed
