name: backend-tests
services:
  postgis:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    environment:
      POSTGRES_DB: database
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpass
    volumes:
      - postgis_data:/var/lib/postgresql
    ports:
      - "5432:5432"
  minio:
    image: minio/minio
    command: ["server", "--console-address", ":9001", "/data"]
    environment:
      MINIO_ROOT_USER: test
      MINIO_ROOT_PASSWORD: testtest1
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - "./assets:/app-data/assets"
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 test testtest1 &&
      mc mb --ignore-existing myminio/varda-local-euc1-soilhive &&
      mc cp --recursive /app-data/assets/ myminio/varda-local-euc1-soilhive/Original_Data/ &&
      exit 0
      "

volumes:
  postgis_data:
  minio_data:
