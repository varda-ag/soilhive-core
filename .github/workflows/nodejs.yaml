name: NodeJS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: {}


permissions:
  contents: read
  pull-requests: read

jobs:

  gate:
    name: Contributor Gate
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/gate-check-reusable.yaml
    with:
      username: ${{ github.event.pull_request.user.login }}
      base-sha: ${{ github.event.pull_request.base.sha }}
      author-association: ${{ github.event.pull_request.author_association }}

  nodejs-frontend:
    name: Node.js Frontend
    needs: gate
    if: always() && (needs.gate.result == 'skipped' || needs.gate.outputs.allowed == 'true')
    uses: ./.github/workflows/nodejs-reusable.yaml
    with:
      node-version: '24'
      project-path: './frontend'
      disable-lint: true
      disable-unit-tests: true
      disable-unit-tests-coverage: true
      disable-integration-tests: true
      disable-integration-tests-coverage: true
      disable-e2e-tests: true
      disable-e2e-tests-coverage: true

  nodejs-backend:
    name: Node.js Backend
    needs: gate
    if: always() && (needs.gate.result == 'skipped' || needs.gate.outputs.allowed == 'true')
    uses: ./.github/workflows/nodejs-reusable.yaml
    with:
      node-version: '24'
      project-path: './backend'
      disable-lint: true
      disable-unit-tests: true
      disable-unit-tests-coverage: true
      disable-integration-tests: true
      disable-integration-tests-coverage: true
      disable-e2e-tests: true
      disable-e2e-tests-coverage: true
      use-npm: true
      use-pnpm: false

