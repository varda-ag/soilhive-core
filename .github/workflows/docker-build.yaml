name: Docker build

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:

  gate:
    name: Contributor Gate
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/gate-check-reusable.yaml
    with:
      username: ${{ github.event.pull_request.user.login }}
      base-sha: ${{ github.event.pull_request.base.sha }}
      author-association: ${{ github.event.pull_request.author_association }}

  image-version:
    name: Determine Image Version
    needs:
      - gate
    if: always() && (needs.gate.result == 'skipped' || needs.gate.outputs.allowed == 'true')
    runs-on: ubuntu-latest
    outputs:
      imageVersion: ${{ steps.image_version.outputs.imageVersion }}
    steps:
      - name: Set imageVersion
        id: image_version
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "imageVersion=pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "imageVersion=${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "imageVersion=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

  build-push-docker-backend:
    uses: ./.github/workflows/docker-build-reusable.yaml
    needs: 
      - gate
      - image-version
    if: always() && (needs.gate.result == 'skipped' || needs.gate.outputs.allowed == 'true')
    with:
      context: backend
      image-name: soilhive-core-backend
      image-version: ${{ needs.image-version.outputs.imageVersion }}
    permissions:
      contents: read
      packages: write
      pull-requests: write

  build-push-docker-frontend:
    uses: ./.github/workflows/docker-build-reusable.yaml
    needs: 
      - gate
      - image-version
    if: always() && (needs.gate.result == 'skipped' || needs.gate.outputs.allowed == 'true')
    with:
      context: frontend
      image-name: soilhive-core-frontend
      image-version: ${{ needs.image-version.outputs.imageVersion }}
    permissions:
      contents: read
      packages: write
      pull-requests: write

