name: Renovate
on:
  # Allows manual/automated ad-hoc trigger
  workflow_dispatch:
    inputs:
      log-level:
        description: Override default log level
        required: false
        default: info
        type: choice
        options:
          - info
          - warning
          - debug
  # Enable retry flag on edits to PRs
  pull_request:
    types:
      - edited
      - reopened
      - synchronize
  issues:
    types:
      - edited
      - reopened
  # Run twice in the early morning for initial and follow up steps (create pull request and merge)
  schedule:
    - cron: 30 4,6 * * *

concurrency: renovate
jobs:
  renovate:
    uses: varda-ag/.github/.github/workflows/renovate.yaml@bf80d0c0e30b15a047dacd693bec8f5bfda03b67 # v1.13.3
    with:
      log-level: ${{ github.event.inputs.log-level || 'info' }}
      gh-app-id: ${{ vars.VARDA_RENOVATE_APP_ID }}
      aws-role-to-assume: ${{ vars.AWS_ROLE_ARN }}
      aws-region: ${{ vars.AWS_REGION }}
    secrets:
      gh-app-private-key: ${{ secrets.VARDA_RENOVATE_PRIVATE_KEY }}
    permissions:
      contents: read
      id-token: write