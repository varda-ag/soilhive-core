name: Node.js CI

on:
  workflow_call:
    inputs:
      node-version:
        description: A comma separated list of Node.js versions to test against
        required: true
        type: string
      project-path:
        description: Path to the project folder
        required: true
        type: string
      disable-lint:
        description: Disable lint execution
        required: false
        type: boolean
        default: false
      disable-unit-tests:
        description: Disable unit tests execution
        required: false
        type: boolean
        default: false
      disable-unit-tests-coverage:
        description: Disable unit tests coverage report generation
        required: false
        type: boolean
        default: false
      disable-integration-tests:
        description: Disable integration tests execution
        required: false
        type: boolean
        default: false
      disable-integration-tests-coverage:
        description: Disable integration tests coverage report generation
        required: false
        type: boolean
        default: false
      disable-e2e-tests:
        description: Disable end-to-end tests execution
        required: false
        type: boolean
        default: false
      disable-e2e-tests-coverage:
        description: Disable end-to-end tests coverage report generation
        required: false
        type: boolean
        default: false
      use-npm:
        description: Use npm as package manager for installing dependencies
        required: false
        type: boolean
        default: false
      use-pnpm:
        description: Use pnpm as package manager for installing dependencies
        required: false
        type: boolean
        default: true
      pnpm-version:
        description: Version of pnpm to use (only applicable if use-pnpm is true)
        required: false
        type: string
        default: 10

jobs:
  process-inputs:
    runs-on: ubuntu-latest
    outputs:
      parsed-node-version: ${{ steps.determine-node-versions.outputs.parsed-node-version }}
      test-types: ${{ steps.determine-test-types.outputs.test-types }}
      package-manager: ${{ steps.determine-package-manager.outputs.package-manager }}
    steps:
      - name: Determine package manager
        id: determine-package-manager
        run: |
          if [ "${{ inputs.use-npm }}" = "true" ] && [ "${{ inputs.use-pnpm }}" = "true" ]; then
            echo "Both npm and pnpm cannot be enabled at the same time"
            exit 1
          fi
          if [ "${{ inputs.use-npm }}" = "false" ] && [ "${{ inputs.use-pnpm }}" = "false" ]; then
            echo "At least one package manager must be enabled"
            exit 1
          fi
          if [ "${{ inputs.use-npm }}" = "true" ]; then
            echo "Using npm as package manager"
            echo "package-manager=npm" >> $GITHUB_OUTPUT
          else
            echo "Using pnpm as package manager"
            echo "package-manager=pnpm" >> $GITHUB_OUTPUT
          fi

      - name: Determine Node Versions
        id: determine-node-versions
        run: |
          nodeVersion="["
          IFS=',' read -ra LIST <<< "${{ inputs.node-version }}"
          for item in "${LIST[@]}"; do
            nodeVersion="${nodeVersion}\"$item\","
          done
          nodeVersion="${nodeVersion}]"
          echo "parsed-node-version=${nodeVersion}" >> $GITHUB_OUTPUT
          
      - name: Determine Test Types
        id: determine-test-types
        run: |
          testTypes="["
          if [ "${{ inputs.disable-unit-tests }}" = "false" ]; then
            testTypes="${testTypes}\"test:unit\","
          fi
          if [ "${{ inputs.disable-unit-tests-coverage }}" = "false" ]; then
            testTypes="${testTypes}\"test:unit:coverage\","
          fi
          if [ "${{ inputs.disable-integration-tests }}" = "false" ]; then
            testTypes="${testTypes}\"test:integration\","
          fi
          if [ "${{ inputs.disable-integration-tests-coverage }}" = "false" ]; then
            testTypes="${testTypes}\"test:integration:coverage\","
          fi
          if [ "${{ inputs.disable-e2e-tests }}" = "false" ]; then
            testTypes="${testTypes}\"test:e2e\","
          fi
          if [ "${{ inputs.disable-e2e-tests-coverage }}" = "false" ]; then
            testTypes="${testTypes}\"test:e2e:coverage\","
          fi
          testTypes="${testTypes}]"
          echo "test-types=${testTypes}" >> $GITHUB_OUTPUT

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: process-inputs

    if: ${{ inputs.disable-lint == false }}

    strategy:
      matrix:
        node-version: ${{ fromJson(needs.process-inputs.outputs.parsed-node-version) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        if: needs.process-inputs.outputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: '${{ needs.process-inputs.outputs.package-manager }}'
          cache-dependency-path: ${{ inputs.project-path }}

      - name: Install Dependencies npm
        if: needs.process-inputs.outputs.package-manager == 'npm'
        run: npm ci
        working-directory: ${{ inputs.project-path }}

      - name: Install Dependencies pnpm
        if: needs.process-inputs.outputs.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile --recursive
        working-directory: ${{ inputs.project-path }}

      - name: Run Linter
        run: ${{ needs.process-inputs.outputs.package-manager }} run lint
        working-directory: ${{ inputs.project-path }}
  
  build:
    name: Build
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: 
      - process-inputs
      - lint

    strategy:
      matrix:
        node-version: ${{ fromJson(needs.process-inputs.outputs.parsed-node-version) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        if: needs.process-inputs.outputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: '${{ needs.process-inputs.outputs.package-manager }}'
          cache-dependency-path: ${{ inputs.project-path }}

      - name: Install Dependencies npm
        if: needs.process-inputs.outputs.package-manager == 'npm'
        run: npm ci
        working-directory: ${{ inputs.project-path }}

      - name: Install Dependencies pnpm
        if: needs.process-inputs.outputs.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile --recursive
        working-directory: ${{ inputs.project-path }}

      - name: Build Project
        run: ${{ needs.process-inputs.outputs.package-manager }} run build
        working-directory: ${{ inputs.project-path }}

  tests:
    name: Test
    runs-on: ubuntu-latest
    needs: 
      - process-inputs
      - build

    continue-on-error: true  # TODO: REMOVE

    strategy:
      matrix:
        node-version: ${{ fromJson(needs.process-inputs.outputs.parsed-node-version) }}
        test-type: ${{ fromJson(needs.process-inputs.outputs.test-types) }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install pnpm
        if: needs.process-inputs.outputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: '${{ needs.process-inputs.outputs.package-manager }}'
          cache-dependency-path: ${{ inputs.project-path }}

      - name: Install Dependencies npm
        if: needs.process-inputs.outputs.package-manager == 'npm'
        run: npm ci
        working-directory: ${{ inputs.project-path }}

      - name: Install Dependencies pnpm
        if: needs.process-inputs.outputs.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile --recursive
        working-directory: ${{ inputs.project-path }}

      - name: Run Unit Tests
        run: ${{ needs.process-inputs.outputs.package-manager }} run ${{ matrix.test-type }}
        working-directory: ${{ inputs.project-path }}
