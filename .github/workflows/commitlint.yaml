name: Commitlint

on:
  pull_request:
    types: 
      - 'opened'
      - 'edited'
      - 'reopened'
      - 'synchronize'
    branches:
      - main

jobs:

  commitlint:
    uses: varda-ag/.github/.github/workflows/commitlint.yaml@bf80d0c0e30b15a047dacd693bec8f5bfda03b67 # v1.13.3
    with:
      pr_base_sha: ${{ github.event.pull_request.base.sha }}
      pr_head_sha: ${{ github.event.pull_request.head.sha }}
      pr_title: ${{ github.event.pull_request.title }}
    permissions:
      contents: read
      pull-requests: write