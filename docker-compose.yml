name: soilhive-core
services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest@sha256:0aae0de7fca85525f727d3354df17896092de8bb26ae4c12d89c77e5df8cbce4
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_password
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgis:5432/database
      KC_DB_USERNAME: dbuser
      KC_DB_PASSWORD: dbpass
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    ports:
      - "8080:8080"
    depends_on:
      - postgis
    volumes:
      - ./quickstart-sample-data/soilhive-realm.json:/opt/keycloak/data/import/soilhive-realm.json
    command: start-dev --import-realm

  postgis:
    image: postgis/postgis:18-3.6@sha256:f248a10d133f63d01aefab324f3462d7e1002e9cc1b65c6585626f6cb7a3d85c
    platform: linux/amd64
    command: ["postgres", "-c", "postgis.gdal_enabled_drivers=ENABLE_ALL"]
    environment:
      POSTGRES_DB: database
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpass
    volumes:
      - postgis_data:/var/lib/postgresql
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: postgis
      POSTGRES_PORT: 5432
      POSTGRES_DB: database
      POSTGRES_USER: dbuser
      POSTGRES_PASSWORD: dbpass
      POSTGRES_SCHEMA: soilhive
      SELF_SIGNING_SECRET: quickstart-demo-signing-secret
      OIDC_JWKS_URL: http://keycloak:8080/realms/soilhive/protocol/openid-connect/certs
      OIDC_AUTHORITY: http://localhost:8080/realms/soilhive
      OIDC_CLIENT_ID: soilhive
      OIDC_REDIRECT_URI: http://localhost:3000/admin
      OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3000/
      OIDC_SILENT_REDIRECT_URI: http://localhost:3000/
      OIDC_SCOPE: openid
    ports:
      - "4001:3000"
    depends_on:
      - postgis
      - keycloak

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      BACKEND_BASE_URL: http://localhost:4001/api/v1
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true

volumes:
  postgis_data:
